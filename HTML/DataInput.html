<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Stats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/MathStats/CSS/DataInputPage.css">
</head>

<body>
    <div class="page-content">
    <div class="title">MATH STATS</div>

    
    <div class="card">

        <img src="/MathStats/IMAGES/skull.png" class="skull left" alt="skull">
        <img src="/MathStats/IMAGES/skull2.png" class="skull right" alt="skull">

        <div class="section-title">📊 Data Input</div>

        <label for="intervalInput">Intervals (Optional)</label>
        <input id="intervalInput" type="text" placeholder="Enter intervals separated by commas">
        <div class="note">
            Leave empty for ungrouped data, or enter intervals separated by commas
        </div>

        <label>Data & Frequency</label>
        <div id="entriesContainer">
            <div class="row">
                <input class="data-input" type="text" placeholder="Data">
                <input class="freq-input" type="text" placeholder="Frequency">
                <button type="button" class="delete-btn">✕</button>
            </div>
        </div>

        <div class="button-row">
            <button id="addBtn" type="button" class="add-btn">+ Add Entry</button>
            <button id="calcBtn" type="button" class="calc-btn">Calculate</button>
            <button id="clearBtn" type="button" class="clear-btn">Clear</button>
        </div>

    </div>
    </div>

    <div class="tutorial-overlay" id="tutorialOverlay" aria-hidden="true">
        <div class="tutorial-scene" aria-hidden="true">
            <div class="hud-grid"></div>
            <div class="hud-circuit"></div>
            <div class="hud-center">
                <div class="ring ring-outer"></div>
                <div class="ring ring-mid"></div>
                <div class="ring ring-mid-2"></div>
                <div class="ring ring-inner"></div>
                <div class="ring ring-core"></div>
                <div class="hud-dots"></div>
                <div class="hud-crosshair"></div>
            </div>
        </div>
        <img src="/MathStats/IMAGES/Kuromi_render.png" class="kuromi-character kuromi-character-primary" alt="Kuromi character">
        <img src="/MathStats/IMAGES/Tut2.png" class="kuromi-character kuromi-character-secondary" alt="Kuromi character tutorial step 2">
        <div
            class="kuromi-dialogue kuromi-dialogue-primary"
            id="kuromiDialogue"
            aria-label="Kuromi dialogue text"
        >Hello There!</div>
        <div
            class="kuromi-dialogue kuromi-dialogue-secondary"
            aria-label="Kuromi tutorial dialogue text"
        >I will give you a Quick Tutorial on how to use the calculator</div>
        <button type="button" class="skip-btn" id="skipTutorialBtn">Skip</button>
    </div>

    <audio id="bgMusic" src="KBGM.mp3" preload="auto" autoplay muted playsinline></audio>

    <script>
        const entriesContainer = document.getElementById("entriesContainer");
        const addBtn = document.getElementById("addBtn");
        const clearBtn = document.getElementById("clearBtn");
        const calcBtn = document.getElementById("calcBtn");
        const intervalInput = document.getElementById("intervalInput");
        const TABLE_DATA_KEY = "mathStatsTableData";
        const tutorialOverlay = document.getElementById("tutorialOverlay");
        const skipTutorialBtn = document.getElementById("skipTutorialBtn");
        const bgMusic = document.getElementById("bgMusic");

        const targetMusicVolume = 0.1 ;
        const skipMusic = new Audio("KBG.mp3");
        skipMusic.preload = "auto";
        skipMusic.volume = targetMusicVolume;
        const tutorialStartDelayMs = 500;
        const hudIntroDurationMs = 1000;
        const hudShrinkDurationMs = 2000;
        const tutorialOutroDurationMs = 350;
        let phaseSmallTimerId;
        let phaseLeftTimerId;

        function unlockAndPlayMusic() {
            bgMusic.muted = false;
            bgMusic.volume = targetMusicVolume;
            bgMusic.play().catch(() => {});
            window.removeEventListener("pointerdown", unlockAndPlayMusic);
            window.removeEventListener("keydown", unlockAndPlayMusic);
        }

        function tryStartBackgroundMusic() {
            bgMusic.muted = true;
            bgMusic.volume = targetMusicVolume;

            const playPromise = bgMusic.play();
            if (playPromise && typeof playPromise.then === "function") {
                playPromise
                    .then(() => {
                        window.requestAnimationFrame(() => {
                            bgMusic.muted = false;
                            bgMusic.volume = targetMusicVolume;
                        });
                    })
                    .catch(() => {
                        window.addEventListener("pointerdown", unlockAndPlayMusic, { once: true });
                        window.addEventListener("keydown", unlockAndPlayMusic, { once: true });
                    });
            }
        }

        tryStartBackgroundMusic();

        document.body.classList.add("tutorial-open");
        window.setTimeout(() => {
            tutorialOverlay.classList.add("is-active");
            tutorialOverlay.setAttribute("aria-hidden", "false");
            phaseSmallTimerId = window.setTimeout(() => {
                if (!tutorialOverlay.classList.contains("is-active")) return;
                tutorialOverlay.classList.add("phase-small");
            }, hudIntroDurationMs);
            phaseLeftTimerId = window.setTimeout(() => {
                if (!tutorialOverlay.classList.contains("is-active")) return;
                tutorialOverlay.classList.add("phase-left");
            }, hudIntroDurationMs + hudShrinkDurationMs);
        }, tutorialStartDelayMs);

        function createRow() {
            const row = document.createElement("div");
            row.className = "row";
            row.innerHTML = `
                <input class="data-input" type="text" placeholder="Data">
                <input class="freq-input" type="text" placeholder="Frequency">
                <button type="button" class="delete-btn">✕</button>
            `;
            return row;
        }

        function getRows() {
            return [...entriesContainer.querySelectorAll(".row")];
        }

        function clearRowsToSingleBlank() {
            entriesContainer.innerHTML = "";
            entriesContainer.appendChild(createRow());
        }

        addBtn.addEventListener("click", () => {
            const newRow = createRow();
            entriesContainer.appendChild(newRow);
            newRow.scrollIntoView({ behavior: "smooth", block: "start" });
        });

        entriesContainer.addEventListener("click", (event) => {
            const target = event.target;
            if (!target.classList.contains("delete-btn")) return;
            const rows = getRows();
            if (rows.length === 1) {
                rows[0].querySelector(".data-input").value = "";
                rows[0].querySelector(".freq-input").value = "";
                return;
            }
            target.closest(".row").remove();
        });

        clearBtn.addEventListener("click", () => {
            intervalInput.value = "";
            clearRowsToSingleBlank();
        });

        function parseIntervalBounds(intervalText) {
            const match = intervalText.match(/(-?\d*\.?\d+)\s*-\s*(-?\d*\.?\d+)/);
            if (!match) return null;
            const lower = Number(match[1]);
            const upper = Number(match[2]);
            if (!Number.isFinite(lower) || !Number.isFinite(upper)) return null;
            const min = Math.min(lower, upper);
            const max = Math.max(lower, upper);
            return {
                lowerLimit: min,
                upperLimit: max,
                midpoint: (min + max) / 2,
                lowerBoundary: min - 0.5,
                upperBoundary: max + 0.5
            };
        }

        function buildTally(frequency) {
            if (frequency === 0) return "-";
            const groupsOfFive = Math.floor(frequency / 5);
            const remainder = frequency % 5;
            const pieces = [];

            for (let i = 0; i < groupsOfFive; i += 1) {
                pieces.push("||||/");
            }
            if (remainder > 0) {
                pieces.push("|".repeat(remainder));
            }
            return pieces.join(" ");
        }

        function formatNumber(value) {
            if (Number.isInteger(value)) return String(value);
            return Number(value.toFixed(4)).toString();
        }

        calcBtn.addEventListener("click", () => {
            const rows = getRows();
            const parsed = [];

            for (let i = 0; i < rows.length; i += 1) {
                const dataValue = rows[i].querySelector(".data-input").value.trim();
                const freqValue = rows[i].querySelector(".freq-input").value.trim();
                if (!dataValue && !freqValue) continue;

                const x = Number(dataValue);
                const f = Number(freqValue);
                if (!Number.isFinite(x) || !Number.isFinite(f) || f < 0 || !Number.isInteger(f)) {
                    alert(`Invalid values on row ${i + 1}. Use numeric data and whole-number non-negative frequency.`);
                    return;
                }
                parsed.push({ x, f });
            }

            if (parsed.length === 0) {
                alert("Add at least one valid data and frequency pair.");
                return;
            }

            const intervals = intervalInput.value
                .split(",")
                .map((s) => s.trim())
                .filter(Boolean);

            if (intervals.length > 0 && intervals.length !== parsed.length) {
                alert("If intervals are provided, they must match the number of data/frequency rows.");
                return;
            }

            const parsedIntervals = intervals.map(parseIntervalBounds);
            for (let i = 0; i < parsedIntervals.length; i += 1) {
                if (parsedIntervals[i] !== null) continue;
                alert(`Invalid interval format at item ${i + 1}. Use format like 10-19.`);
                return;
            }

            const totalFrequency = parsed.reduce((sum, row) => sum + row.f, 0);
            if (totalFrequency === 0) {
                alert("Total frequency cannot be zero.");
                return;
            }

            const tableRows = [];
            let cumulativeFrequency = 0;
            for (let i = 0; i < parsed.length; i += 1) {
                const row = parsed[i];
                cumulativeFrequency += row.f;
                const intervalText = intervals[i] || `${row.x}`;
                const intervalBounds = intervals[i] ? parsedIntervals[i] : null;
                const midpoint = intervalBounds ? intervalBounds.midpoint : row.x;
                const lowerBoundary = intervalBounds ? intervalBounds.lowerBoundary : row.x - 0.5;
                const upperBoundary = intervalBounds ? intervalBounds.upperBoundary : row.x + 0.5;
                const fx = midpoint * row.f;

                tableRows.push({
                    classInterval: intervalText,
                    tally: buildTally(row.f),
                    frequency: row.f,
                    midpoint,
                    classBoundaries: `${formatNumber(lowerBoundary)} - ${formatNumber(upperBoundary)}`,
                    fx,
                    cumulativeFrequency
                });
            }

            const sumFX = tableRows.reduce((sum, row) => sum + row.fx, 0);
            const mean = sumFX / totalFrequency;

            const sumFExpression = parsed.map((row) => row.f).join(" + ");
            const sumFXExpression = tableRows
                .map((row) => `(${formatNumber(row.midpoint)} × ${row.frequency})`)
                .join(" + ");

            const processSteps = [
                `Given ${parsed.length} data point(s) with frequency values.`,
                "Formula used: Mean = Σfx / Σf",
                `Compute Σf: ${sumFExpression} = ${formatNumber(totalFrequency)}`,
                `Compute Σfx: ${sumFXExpression} = ${formatNumber(sumFX)}`,
                `Final Mean: ${formatNumber(sumFX)} / ${formatNumber(totalFrequency)} = ${formatNumber(mean)}`
            ];

            const payload = {
                rows: tableRows,
                totals: {
                    totalFrequency,
                    sumFX,
                    mean
                },
                processSteps
            };

            localStorage.setItem(TABLE_DATA_KEY, JSON.stringify(payload));
            window.location.href = "Table.html";
        });

        skipTutorialBtn.addEventListener("click", () => {
            if (!tutorialOverlay.classList.contains("is-active")) return;
            if (phaseSmallTimerId) window.clearTimeout(phaseSmallTimerId);
            if (phaseLeftTimerId) window.clearTimeout(phaseLeftTimerId);
            bgMusic.pause();
            skipMusic.currentTime = 0;
            skipMusic.play().catch(() => {});
            tutorialOverlay.classList.add("is-exiting");
            tutorialOverlay.setAttribute("aria-hidden", "true");
            window.setTimeout(() => {
                tutorialOverlay.classList.remove("is-active", "is-exiting", "phase-small", "phase-left");
                document.body.classList.remove("tutorial-open");
            }, tutorialOutroDurationMs);
        });
    </script>

</body>
</html>
