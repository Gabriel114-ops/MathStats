<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Stats - Solution Process</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/Table.css">
</head>
<body>

<div class="container">
    <h1>All Solution Process</h1>
    <section class="process-card">
        <ol id="processList"></ol>
        <div class="summary" id="summaryBox"></div>
        <div class="process-actions">
            <a class="process-link" href="Table.html">Back to Table</a>
            <a class="back-link" id="backToInputLink" href="DataInput.html">Back to Data Input</a>
        </div>
    </section>
</div>

<script>
    const TABLE_DATA_KEY = "mathStatsTableData";
    const SKIP_TUTORIAL_ON_RETURN_KEY = "mathStatsSkipTutorialOnReturn";
    const processList = document.getElementById("processList");
    const summaryBox = document.getElementById("summaryBox");
    const backToInputLink = document.getElementById("backToInputLink");

    function formatNumber(value) {
        if (!Number.isFinite(value)) return "-";
        if (Number.isInteger(value)) return String(value);
        return Number(value.toFixed(4)).toString();
    }

    function escapeHtml(text) {
        return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
    }

    function emphasizeProcessLabels(stepText) {
        return escapeHtml(stepText);
    }

    function renderEmptyState() {
        processList.innerHTML = "<li>No process data yet. Calculate first from the Data Input page.</li>";
        summaryBox.innerHTML = `
            <div class="summary-title" style="font-family: sans-serif;">Summary</div>
            <div class="summary-grid">
                <div class="summary-item">
                    <div class="summary-label" style="font-family: sans-serif;">Status</div>
                    <div class="summary-value" style="font-family: sans-serif">Waiting for input data</div>
                </div>
            </div>
        `;
    }

    const raw = localStorage.getItem(TABLE_DATA_KEY);
    if (!raw) {
        renderEmptyState();
    } else {
        try {
            const payload = JSON.parse(raw);
            const steps = Array.isArray(payload?.processSteps) ? payload.processSteps : [];
            const totals = payload?.totals;
            if (steps.length === 0) {
                renderEmptyState();
            } else {
                const useInterpolation =
                    Boolean(payload?.useInterpolation) ||
                    steps.some((step) => /interpolated\s+grouped\s+data/i.test(String(step)));

                const highlightedStepNumbers = useInterpolation
                    ? [5, 8, 11, 14, 15]
                    : [5, 8, 10, 13, 14];
                const highlightedSet = new Set(highlightedStepNumbers);

                processList.innerHTML = steps
                    .map((step, index) => {
                        const stepNumber = index + 1;
                        const numberClass = highlightedSet.has(stepNumber)
                            ? "process-step-number is-highlight"
                            : "process-step-number";

                        return `
                            <li>
                                <span class="${numberClass}">${stepNumber}</span>
                                <span class="process-step-text">${emphasizeProcessLabels(step)}</span>
                            </li>
                        `;
                    })
                    .join("");

                const modeText = Array.isArray(totals?.modeValues) && totals.modeValues.length > 0
                    ? totals.modeValues.map((value) => formatNumber(value)).join(", ")
                    : "-";

                const summaryItems = [
                    ["Σf", formatNumber(totals?.totalFrequency)],
                    ["Σfx", formatNumber(totals?.sumFX)],
                    ["Mean", formatNumber(totals?.mean)],
                    ["Median", formatNumber(totals?.median)],
                    ["Mode", modeText],
                    ["Standard Deviation", formatNumber(totals?.standardDeviation)]
                ];

                summaryBox.innerHTML = `
                    <div class="summary-title">Summary</div>
                    <div class="summary-grid">
                        ${summaryItems
                            .map(([label, value]) => `
                                <div class="summary-item">
                                    <div class="summary-label">${label}</div>
                                    <div class="summary-value">${escapeHtml(value)}</div>
                                </div>
                            `)
                            .join("")}
                    </div>
                `;
            }
        } catch (error) {
            renderEmptyState();
        }
    }

    backToInputLink.addEventListener("click", () => {
        sessionStorage.setItem(SKIP_TUTORIAL_ON_RETURN_KEY, "1");
    });
</script>

</body>
</html>
